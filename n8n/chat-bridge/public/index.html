<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Bridge - 多方对话</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .chat-container {
      width: 100%;
      max-width: 800px;
      height: 90vh;
      background: #0f0f23;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .chat-header {
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      color: white;
      text-align: center;
    }
    
    .chat-header h1 {
      font-size: 1.5em;
      margin-bottom: 5px;
    }
    
    .chat-header .status {
      font-size: 0.85em;
      opacity: 0.8;
    }
    
    .chat-header .status.connected {
      color: #4ade80;
    }
    
    .chat-header .status.disconnected {
      color: #f87171;
    }
    
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.from-user {
      align-self: flex-end;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }
    
    .message.from-openclaw {
      align-self: flex-start;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
      border-bottom-left-radius: 4px;
    }
    
    .message.from-opencode {
      align-self: flex-start;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      border-bottom-left-radius: 4px;
    }
    
    .message.from-system {
      align-self: center;
      background: rgba(255,255,255,0.1);
      color: #888;
      font-size: 0.85em;
      padding: 8px 16px;
    }
    
    .message .sender {
      font-size: 0.75em;
      opacity: 0.8;
      margin-bottom: 4px;
    }
    
    .message .text {
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    
    .message .time {
      font-size: 0.7em;
      opacity: 0.6;
      margin-top: 4px;
      text-align: right;
    }
    
    .input-container {
      padding: 20px;
      background: #1a1a2e;
      display: flex;
      gap: 10px;
    }
    
    .input-container input {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 25px;
      background: #2a2a4a;
      color: white;
      font-size: 1em;
      outline: none;
    }
    
    .input-container input::placeholder {
      color: #666;
    }
    
    .input-container button {
      padding: 14px 28px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-size: 1em;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .input-container button:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    
    .input-container button:active {
      transform: scale(0.98);
    }
    
    .participants {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 8px;
      font-size: 0.8em;
    }
    
    .participant {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .participant .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    .participant.user .dot { background: #667eea; }
    .participant.openclaw .dot { background: #38ef7d; }
    .participant.opencode .dot { background: #f5576c; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>🤝 Chat Bridge</h1>
      <div class="status" id="status">正在连接...</div>
      <div class="participants">
        <div class="participant user"><span class="dot"></span>用户</div>
        <div class="participant openclaw"><span class="dot"></span>OpenClaw</div>
        <div class="participant opencode"><span class="dot"></span>OpenCode</div>
      </div>
    </div>
    
    <div class="messages-container" id="messages">
      <div class="message from-system">
        <div class="text">欢迎来到 Chat Bridge！你可以在这里与 AI Agents 对话。</div>
      </div>
    </div>
    
    <div class="input-container">
      <input type="text" id="input" placeholder="输入消息..." autocomplete="off">
      <button onclick="sendMessage()">发送</button>
    </div>
  </div>

  <script>
    const socket = io();
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const statusEl = document.getElementById('status');
    
    let connected = false;
    
    // 连接状态
    socket.on('connect', () => {
      connected = true;
      statusEl.textContent = '已连接';
      statusEl.className = 'status connected';
    });
    
    socket.on('disconnect', () => {
      connected = false;
      statusEl.textContent = '已断开';
      statusEl.className = 'status disconnected';
    });
    
    // 接收历史消息
    socket.on('history', (messages) => {
      messages.forEach(addMessage);
      scrollToBottom();
    });
    
    // 接收新消息
    socket.on('message', (msg) => {
      addMessage(msg);
      scrollToBottom();
    });
    
    // 发送消息
    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || !connected) return;
      
      socket.emit('send', { text });
      inputEl.value = '';
    }
    
    // 回车发送
    inputEl.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    
    // 添加消息到界面
    function addMessage(msg) {
      const div = document.createElement('div');
      
      let className = 'message';
      if (msg.from === 'User') className += ' from-user';
      else if (msg.from === 'OpenClaw') className += ' from-openclaw';
      else if (msg.from === 'OpenCode') className += ' from-opencode';
      else className += ' from-system';
      
      const time = new Date(msg.timestamp).toLocaleTimeString('zh-CN', {
        hour: '2-digit', minute: '2-digit'
      });
      
      div.className = className;
      div.innerHTML = `
        ${msg.from !== 'System' ? `<div class="sender">${msg.from}</div>` : ''}
        <div class="text">${escapeHtml(msg.text)}</div>
        ${msg.timestamp ? `<div class="time">${time}</div>` : ''}
      `;
      
      messagesEl.appendChild(div);
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  </script>
</body>
</html>
