<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- 透明背景 -->
  <defs>
    <!-- 发财绿色渐变 -->
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <!-- 红中红色渐变 -->
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <!-- 白板灰色渐变 -->
    <linearGradient id="whiteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="100%" stop-color="#d1d5db"/>
    </linearGradient>
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 发财 (左上) -->
  <g transform="translate(128, 128)">
    <rect width="320" height="480" rx="32" fill="url(#greenGradient)" filter="url(#shadow)"/>
    <text x="160" y="280" font-family="SimHei, 'Microsoft YaHei', serif" font-size="180" font-weight="bold" fill="white" text-anchor="middle">发</text>
  </g>
  
  <!-- 红中 (右下) -->
  <g transform="translate(576, 416)">
    <rect width="320" height="480" rx="32" fill="url(#redGradient)" filter="url(#shadow)"/>
    <text x="160" y="280" font-family="SimHei, 'Microsoft YaHei', serif" font-size="180" font-weight="bold" fill="white" text-anchor="middle">中</text>
  </g>
  
  <!-- 白板 (右上-左下重叠) -->
  <g transform="translate(384, 256)">
    <rect width="320" height="480" rx="32" fill="url(#whiteGradient)" filter="url(#shadow)"/>
    <!-- 白板边框 -->
    <rect x="40" y="40" width="240" height="400" rx="20" fill="none" stroke="#6b7280" stroke-width="8"/>
  </g>
</svg>