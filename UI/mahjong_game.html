<script>
        // 模拟消息滚动逻辑
        const chatBox = document.querySelector('.chat-scroll');
        chatBox.scrollTop = chatBox.scrollHeight;

        // 聊天对话框拖拽与缩放功能
        const movableChat = document.getElementById('movable-chat');
        const chatHeader = document.getElementById('chat-header');
        const chatResizer = document.getElementById('chat-resizer');

        let isDragging = false;
        let isResizing = false;
        let startX, startY, startWidth, startHeight, startLeft, startTop;

        // 辅助获取坐标（兼容触摸）
        const getCoords = (e) => {
            return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY };
        };

        // 拖拽位置逻辑
        const startDrag = (e) => {
            if (e.target.closest('button')) return; // 避免点击按钮触发拖拽
            isDragging = true;
            const coords = getCoords(e);
            const rect = movableChat.getBoundingClientRect();
            startX = coords.x - rect.left;
            startY = coords.y - rect.top;
            movableChat.style.position = 'fixed';
            movableChat.style.left = rect.left + 'px';
            movableChat.style.top = rect.top + 'px';
            movableChat.style.margin = '0';
        };

        // 缩放大小逻辑
        const startResize = (e) => {
            e.stopPropagation();
            e.preventDefault();
            isResizing = true;
            const coords = getCoords(e);
            // 移除 Tailwind 宽度限制类，让 JS 的 inline style 生效
            movableChat.classList.remove('w-full', 'sm:w-2/3', 'max-w-[500px]');
            startWidth = movableChat.offsetWidth;
            startHeight = movableChat.offsetHeight;
            startX = coords.x;
            startY = coords.y;
        };

        const onMove = (e) => {
            if (!isDragging && !isResizing) return;
            const coords = getCoords(e);

            if (isDragging) {
                movableChat.style.left = (coords.x - startX) + 'px';
                movableChat.style.top = (coords.y - startY) + 'px';
            } else if (isResizing) {
                const newWidth = startWidth + (coords.x - startX);
                const newHeight = startHeight + (coords.y - startY);
                movableChat.style.width = newWidth + 'px';
                movableChat.style.height = newHeight + 'px';
            }
        };

        const stopInteraction = () => {
            isDragging = false;
            isResizing = false;
        };

        // 绑定事件
        chatHeader.addEventListener('mousedown', startDrag);
        chatHeader.addEventListener('touchstart', startDrag, { passive: true });
        chatResizer.addEventListener('mousedown', startResize);
        chatResizer.addEventListener('touchstart', startResize, { passive: false });

        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('mouseup', stopInteraction);
        window.addEventListener('touchend', stopInteraction);

        // 简单的随机消息插入模拟动态感
        const mockMessages = [
            { name: 'AI专家', text: '我觉得你打这张牌不对。', pos: 'left' },
            { name: '系统', text: '对手正在考虑胡牌的概率...', pos: 'center' },
            { name: '雀界老李', text: '碰！不好意思各位。', pos: 'left' }
        ];

        let msgIdx = 0;
        setInterval(() => {
            if(msgIdx < mockMessages.length) {
                const msg = mockMessages[msgIdx];
                const div = document.createElement('div');
                div.className = `flex flex-col gap-1 ${msg.pos === 'center' ? 'items-center' : 'items-start'}`;
                div.innerHTML = `
                    <span class="text-[10px] text-white/50">${msg.name}</span>
                    <div class="${msg.pos === 'center' ? 'bg-black/40 text-[9px]' : 'bg-white/10'} rounded-lg px-3 py-1 text-white max-w-[90%]">${msg.text}</div>
                `;
                chatBox.appendChild(div);
                chatBox.scrollTo({top: chatBox.scrollHeight, behavior: 'smooth'});
                msgIdx++;
            }
        }, 8000);
    </script></body>
