<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>五子棋 - 双人对战</title><style>*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Segoe UI,Microsoft YaHei,sans-serif;padding:20px}h1{color:#e8d5b7;margin-bottom:20px;text-shadow:2px 2px 4px rgba(0,0,0,0.5);font-size:2.5rem}.game-info{display:flex;align-items:center;gap:30px;margin-bottom:20px}.current-player{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.1);padding:12px 24px;border-radius:30px;backdrop-filter:blur(10px)}.player-label{color:#aaa;font-size:1.1rem}.player-piece{width:36px;height:36px;border-radius:50%;box-shadow:0 4px 8px rgba(0,0,0,0.3),inset 0 -3px 6px rgba(0,0,0,0.2)}.player-piece.black{background:radial-gradient(circle at 30% 30%,#555,#111)}.player-piece.white{background:radial-gradient(circle at 30% 30%,#fff,#ddd);border:1px solid #ccc}.btn-group{display:flex;gap:12px}.btn{padding:12px 24px;font-size:1rem;border:none;border-radius:8px;cursor:pointer;transition:all .3s ease;font-weight:600}.btn-restart{background:linear-gradient(145deg,#e74c3c,#c0392b);color:#fff}.btn-undo{background:linear-gradient(145deg,#3498db,#2980b9);color:#fff}.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.3)}.btn:active{transform:translateY(0)}.btn:disabled{opacity:.5;cursor:not-allowed}.board-container{background:linear-gradient(145deg,#d4a574,#c49a6c);padding:20px;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,0.4),inset 0 2px 4px rgba(255,255,255,0.3)}.board{display:grid;grid-template-columns:repeat(15,1fr)}.cell{width:40px;height:40px;position:relative;cursor:pointer}.cell::before{content:"";position:absolute;top:50%;left:0;right:0;height:2px;background:#5d4037}.cell::after{content:"";position:absolute;left:50%;top:0;bottom:0;width:2px;background:#5d4037}.cell[data-row="0"]::before{left:50%}.cell[data-row="14"]::before{right:50%}.cell[data-col="0"]::after{top:50%}.cell[data-col="14"]::after{bottom:50%}.star-dot{display:none;position:absolute;width:10px;height:10px;background:#3e2723;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1}.cell.star .star-dot{display:block}.piece{position:absolute;width:34px;height:34px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;box-shadow:0 3px 6px rgba(0,0,0,0.3),inset 0 -3px 6px rgba(0,0,0,0.2);animation:p .2s}@keyframes p{0%{transform:translate(-50%,-50%) scale(0)}100%{transform:translate(-50%,-50%) scale(1)}}.piece.black{background:radial-gradient(circle at 30% 30%,#555,#111)}.piece.white{background:radial-gradient(circle at 30% 30%,#fff,#ddd);border:1px solid #ccc}.piece.last{box-shadow:0 0 0 3px #e74c3c}.piece.win{animation:w .8s infinite}@keyframes w{0%,100%{box-shadow:0 0 0 4px #f1c40f}50%{box-shadow:0 0 0 8px #f1c40f}}.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center}.modal.show{display:flex}.modal>div{background:linear-gradient(145deg,#2c3e50,#1a252f);padding:40px 60px;border-radius:20px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5)}.modal h2{color:#f1c40f;font-size:2rem;margin-bottom:20px}.modal .info{display:flex;align-items:center;justify-content:center;gap:15px;margin-bottom:30px;color:#fff;font-size:1.5rem}.modal .p{width:50px;height:50px;border-radius:50%}.score-board{display:flex;gap:30px;margin-bottom:20px}.score{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.1);padding:10px 20px;border-radius:10px;color:#fff}.score .sp{width:24px;height:24px;border-radius:50%}.score .sp.black{background:radial-gradient(circle at 30% 30%,#555,#111)}.score .sp.white{background:radial-gradient(circle at 30% 30%,#fff,#ddd);border:1px solid #ccc}</style></head><body><h1>五子棋</h1><div class=score-board><div class=score><div class="sp black"></div><span>黑方:<b id=bs>0</b></span></div><div class=score><div class="sp white"></div><span>白方:<b id=ws>0</b></span></div></div><div class=game-info><div class=current-player><span class=player-label>当前:</span><div id=cp class="player-piece black"></div><span id=ct>黑方</span></div><div class=btn-group><button class="btn btn-undo" id=ub onclick=u()>悔棋</button><button class="btn btn-restart" onclick=r()>重新开始</button></div></div><div class=board-container><div id=board class=board></div></div><div id=m class=modal><div><h2>🎉 恭喜!</h2><div class=info><div id=wp class=p></div><span id=wn></span></div><button class="btn btn-restart" onclick=r()>再来一局</button></div></div><script>const SZ=15,E=0,B=1,W=2,SP=[[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]];let bd=[],cp=B,hs=[],bw=0,ww=0,go=!1;function ib(){bd=Array(SZ).fill(0).map(()=>Array(SZ).fill(E));hs=[];cp=B;go=!1;const be=document.getElementById("board");be.innerHTML="";for(let i=0;i<SZ;i++){for(let j=0;j<SZ;j++){const c=document.createElement("div");c.className="cell";c.dataset.r=i;c.dataset.c=j;if(SP.some(([a,b])=>a==i&&b==j)){const d=document.createElement("div");d.className="star-dot";c.classList.add("star");c.appendChild(d)}c.onclick=()=>pc(i,j);be.appendChild(c)}}ui()}function pc(r,c){if(go||bd[r][c]!=E)return;bd[r][c]=cp;hs.push({r,c,p:cp});const ce=document.querySelector(`.cell[data-r=""][data-c=""]`);const pc=document.createElement("div");pc.className="piece "+(cp==B?"black":"white");pc.id="pc"+(hs.length-1);ce.appendChild(pc);if(cw(r,c,cp)){go=!0;cp==B?bw++:ww++;hw(r,c,cp);setTimeout(ws,800)}else{cp=cp==B?W:B;ui()}ulp()}function ulp(){document.querySelectorAll(".piece").forEach(x=>x.classList.remove("last"));if(hs.length){const lp=document.getElementById("pc"+(hs.length-1));if(lp)lp.classList.add("last")}}function cw(r,c,p){const ds=[[0,1],[1,0],[1,1],[1,-1]];for(const[dr,dc]of ds){let t=1;for(let i=1;i<5;i++){const R=r+dr*i,C=c+dc*i;if(R<0||R>=SZ||C<0||C>=SZ||bd[R][C]!=p)break;t++}for(let i=1;i<5;i++){const R=r-dr*i,C=c-dc*i;if(R<0||R>=SZ||C<0||C>=SZ||bd[R][C]!=p)break;t++}if(t>=5)return!0}return!1}function hw(r,c,p){const ds=[[0,1],[1,0],[1,1],[1,-1]];for(const[dr,dc]of ds){let ps=[{r,c}];for(let i=1;i<5;i++){const R=r+dr*i,C=c+dc*i;if(R<0||R>=SZ||C<0||C>=SZ||bd[R][C]!=p)break;ps.push({r:R,c:C})}for(let i=1;i<5;i++){const R=r-dr*i,C=c-dc*i;if(R<0||R>=SZ||C<0||C>=SZ||bd[R][C]!=p)break;ps.push({r:R,c:C})}if(ps.length>=5){ps.sort((a,b)=>dr?a.r-b.r:a.c-b.c);ps.forEach(pu=>{const ix=hs.findIndex(h=>h.r==pu.r&&h.c==pu.c);if(ix>=0){const px=document.getElementById("pc"+ix);if(px)px.classList.add("win")}}));return}}}function u(){if(hs.length==0||go)return;const lm=hs.pop();bd[lm.r][lm.c]=E;const ce=document.querySelector(".cell[data-r="+lm.r+"][data-c="+lm.c+"]");const pc=ce.querySelector(".piece");if(pc)pc.remove();cp=lm.p;ui();ulp()}function r(){document.getElementById("m").classList.remove("show");ib()}function ws(){const m=document.getElementById("m"),wp=document.getElementById("wp"),wn=document.getElementById("wn");wp.className="p "+(cp==B?"black":"white");wn.textContent=cp==B?"黑方获胜!":"白方获胜!";document.getElementById("bs").textContent=bw;document.getElementById("ws").textContent=ww;m.classList.add("show")}function ui(){const pe=document.getElementById("cp"),te=document.getElementById("ct"),ub=document.getElementById("ub");pe.className="player-piece "+(cp==B?"black":"white");te.textContent=cp==B?"黑方":"白方";ub.disabled=hs.length==0||go}document.onkeydown=e=>{if(e.key=="z"&&(e.ctrlKey||e.metaKey)){e.preventDefault();u()}if(e.key=="r"&&(e.ctrlKey||e.metaKey)){e.preventDefault();r()}};ib();</script></body></html>
