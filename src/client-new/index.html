<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>神州雀王 - AI麻将派对</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

    :root {
        --mj-bg: #1a4d2e;
        --mj-table: #2d6a4f;
        --mj-gold: #ffb703;
    }

    body {
        background-color: #0f172a;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        overflow: hidden;
    }

    .mahjong-table {
        background: radial-gradient(circle, var(--mj-table) 0%, var(--mj-bg) 100%);
        border: 12px solid #3e2723;
        box-shadow: inset 0 0 100px rgba(0,0,0,0.5), 0 25px 50px -12px rgba(0,0,0,0.5);
    }

    .tile {
        perspective: 1000px;
        transition: transform 0.2s;
    }
    .tile:hover {
        transform: translateY(-10px);
        cursor: pointer;
    }

    .glass-panel {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .chat-scroll::-webkit-scrollbar {
        width: 4px;
    }
    .chat-scroll::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.2);
        border-radius: 10px;
    }

    /* 可拖拽对话框样式 */
    .resizable-chat {
        height: 280px;      /* 固定初始高度 */
        min-height: 200px;
        min-width: 250px;
        max-height: 80vh;
        max-width: 90vw;
        position: relative;
        z-index: 100;
    }

    .drag-handle {
        cursor: move;
        user-select: none;
    }

    .resize-handle {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 20px;
        height: 20px;
        cursor: nwse-resize;
        background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.3) 50%);
        border-radius: 0 0 0.75rem 0;
    }

    /* 手机端适配优化 */
    @media (max-width: 640px) {
        .mobile-hidden { display: none; }
        .tile { width: 30px; height: 42px; }
        .chat-area { height: 120px; font-size: 12px; }
    }
</style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center p-2 sm:p-4">

<!-- 方位选择弹窗 -->
<div id="position-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-[200]">
  <div class="glass-panel rounded-2xl p-6 sm:p-8 max-w-sm w-full mx-4 text-center">
    <h2 class="text-xl sm:text-2xl font-bold text-white mb-2">选择你的座位</h2>
    <p class="text-white/60 text-sm mb-6">点击选择方位，先到先得</p>
    
    <!-- 座位图 -->
    <div class="relative w-48 h-48 sm:w-56 sm:h-56 mx-auto mb-6">
      <!-- 北 -->
      <button id="pos-north" class="absolute top-0 left-1/2 -translate-x-1/2 w-16 h-16 sm:w-20 sm:h-20 rounded-xl glass-panel flex flex-col items-center justify-center text-white hover:bg-white/20 transition-all" data-position="2">
        <span class="text-lg font-bold">北</span>
        <span class="text-xs text-white/50" id="pos-north-status">空</span>
      </button>
      
      <!-- 西 -->
      <button id="pos-west" class="absolute left-0 top-1/2 -translate-y-1/2 w-16 h-16 sm:w-20 sm:h-20 rounded-xl glass-panel flex flex-col items-center justify-center text-white hover:bg-white/20 transition-all" data-position="3">
        <span class="text-lg font-bold">西</span>
        <span class="text-xs text-white/50" id="pos-west-status">空</span>
      </button>
      
      <!-- 东 -->
      <button id="pos-east" class="absolute right-0 top-1/2 -translate-y-1/2 w-16 h-16 sm:w-20 sm:h-20 rounded-xl glass-panel flex flex-col items-center justify-center text-white hover:bg-white/20 transition-all" data-position="1">
        <span class="text-lg font-bold">东</span>
        <span class="text-xs text-white/50" id="pos-east-status">空</span>
      </button>
      
      <!-- 南 -->
      <button id="pos-south" class="absolute bottom-0 left-1/2 -translate-x-1/2 w-16 h-16 sm:w-20 sm:h-20 rounded-xl glass-panel flex flex-col items-center justify-center text-white hover:bg-white/20 transition-all" data-position="0">
        <span class="text-lg font-bold">南</span>
        <span class="text-xs text-white/50" id="pos-south-status">空</span>
      </button>
      
      <!-- 中心装饰 -->
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-yellow-600/50 flex items-center justify-center">
        <span class="text-yellow-300 text-lg">🀄</span>
      </div>
    </div>
    
<!-- 玩家名输入 -->
<div class="mb-4">
<input type="text" id="player-name-input" placeholder="输入你的昵称" class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-2 text-white text-center outline-none focus:border-yellow-500/50" maxlength="8" value=""/>
</div>
    
    <p class="text-white/40 text-xs">选择座位后自动进入游戏</p>
  </div>
</div>

<!-- 开始按钮（游戏开始前显示） -->
<div id="start-button-container" class="fixed bottom-32 left-1/2 -translate-x-1/2 z-[150] hidden">
  <button id="start-game-btn" class="px-8 py-3 bg-yellow-600 hover:bg-yellow-500 text-white font-bold rounded-full shadow-lg transition-all text-lg">
    开始游戏
  </button>
</div>


<!-- 顶栏状态 -->
<div class="fixed top-0 left-0 w-full p-4 flex justify-between items-center z-50 pointer-events-none">
<div class="glass-panel rounded-full px-4 py-2 flex items-center gap-4 text-white pointer-events-auto" id="player-info">
<div class="flex items-center gap-2">
<span class="iconify text-yellow-500" data-icon="mdi:gold"></span>
<span class="font-bold" id="player-score">0</span>
</div>
<div class="h-4 w-[1px] bg-white/20"></div>
<div class="flex items-center gap-2">
<span class="iconify text-blue-400" data-icon="mdi:account"></span>
<span id="player-name-display">等待中...</span>
</div>
</div>
<div class="glass-panel rounded-full px-6 py-2 text-white font-bold text-lg pointer-events-auto" id="game-info">

</div>
<div class="flex gap-2 pointer-events-auto">
<button id="settings-btn" class="glass-panel p-2 rounded-full text-white hover:bg-white/20"><span class="iconify" data-icon="mdi:cog"></span></button>
<button class="glass-panel p-2 rounded-full text-white hover:bg-white/20"><span class="iconify" data-icon="mdi:help-circle"></span></button>

</div>

<!-- 设置弹窗 -->
<div id="settings-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[300] hidden">

        <h3 class="text-white/60 text-sm mb-2">已保存的配置</h3>
        <div id="llm-saved-list" class="space-y-2">
          <!-- 动态加载 -->
        </div>
      </div>
    </div>
    
    <!-- Tab 2: 玩家配置 -->
    <div id="panel-player" class="p-4 overflow-y-auto hidden" style="max-height: calc(80vh - 120px);">
      <!-- 玩家数量选择 -->
      <div class="mb-6">
        <h3 class="text-white font-bold mb-3">玩家配置</h3>
        <div class="grid grid-cols-3 gap-4 mb-2">
          <div class="text-center">
            <label class="text-white/60 text-sm block mb-1">真人玩家</label>
            <div class="flex items-center justify-center gap-2">
              <button class="player-num-btn w-8 h-8 bg-white/10 rounded text-white hover:bg-yellow-600" data-type="human" data-action="dec">-</button>
              <span id="human-count" class="text-white text-xl font-bold w-8">1</span>
              <button class="player-num-btn w-8 h-8 bg-white/10 rounded text-white hover:bg-yellow-600" data-type="human" data-action="inc">+</button>
            </div>
          </div>
          <div class="text-center">
            <label class="text-white/60 text-sm block mb-1">AI玩家</label>
            <div class="flex items-center justify-center gap-2">
              <button class="player-num-btn w-8 h-8 bg-white/10 rounded text-white hover:bg-yellow-600" data-type="ai" data-action="dec">-</button>
              <span id="ai-count" class="text-white text-xl font-bold w-8">0</span>
              <button class="player-num-btn w-8 h-8 bg-white/10 rounded text-white hover:bg-yellow-600" data-type="ai" data-action="inc">+</button>
            </div>
          </div>
          <div class="text-center">
            <label class="text-white/60 text-sm block mb-1">NPC</label>
            <div class="flex items-center justify-center gap-2">
              <button class="player-num-btn w-8 h-8 bg-white/10 rounded text-white hover:bg-yellow-600" data-type="npc" data-action="dec">-</button>
              <span id="npc-count" class="text-white text-xl font-bold w-8">0</span>
              <button class="player-num-btn w-8 h-8 bg-white/10 rounded text-white hover:bg-yellow-600" data-type="npc" data-action="inc">+</button>
            </div>
          </div>
        </div>
        <p class="text-white/40 text-xs text-center">总数不超过 4 人</p>
      </div>
      
      <!-- AI 配置列表 -->
      <div id="ai-config-list" class="space-y-4">
        <!-- 动态生成 -->
      </div>
    </div>
    
    <!-- 底部按钮 -->
    <div class="border-t border-white/10 p-4 flex gap-2">
      <button id="settings-save-btn" class="flex-1 py-3 bg-yellow-600 hover:bg-yellow-500 text-white font-bold rounded-lg">保存</button>
      <button id="settings-close-btn" class="px-6 py-3 bg-white/10 hover:bg-white/20 text-white rounded-lg">取消</button>
    </div>
  </div>
</div>

<!-- 游戏主桌面 -->
<div class="relative w-full max-w-[1200px] aspect-square sm:aspect-video mahjong-table rounded-[40px] flex items-center justify-center overflow-hidden">

<!-- 背景装饰纹理 -->

<span class="iconify text-[400px]" data-icon="mdi:yin-yang"></span>
</div>

<div class="absolute top-8 left-1/2 -translate-x-1/2 flex flex-col items-center" data-position="north" id="player-north">
<div class="flex items-center gap-2 bg-black/40 px-3 py-1 rounded-full border border-white/10 mb-2">
<div class="player-avatar w-6 h-6 rounded-full border border-white/50 flex items-center justify-center text-white text-xs font-bold"></div>
<span class="player-name text-white text-xs whitespace-nowrap">等待中</span>
<span class="player-score text-yellow-400 text-xs font-bold">0</span>
<span class="player-status text-yellow-400 text-[8px]"></span>
</div>
<div class="player-hand flex gap-1 mb-1">

</div>
<!-- 弃牌区 - 支持换行显示两溜 -->
<div class="player-discards flex flex-wrap gap-0.5 mb-1 max-w-[200px]" id="north-discards"></div>
<!-- 副露区 (最靠近中心) -->

</div>

<!-- 玩家：西 (左) -->
<div class="absolute left-4 top-1/2 -translate-y-1/2 flex flex-row items-center gap-4" data-position="west" id="player-west">
<div class="flex flex-col items-center gap-2 bg-black/40 p-2 rounded-xl border border-white/10">
<div class="player-avatar w-10 h-10 lg:w-16 lg:h-16 rounded-full border-2 border-white/30 flex items-center justify-center">
<span class="avatar-letter text-xl lg:text-2xl font-bold"></span>
<span class="avatar-icon text-sm lg:text-base"></span>
</div>
<span class="player-name text-white text-xs font-bold">等待中</span>
<span class="player-score text-yellow-400 text-xs font-bold">0</span>
<div class="player-status text-yellow-400 text-[10px] sm:text-xs"></div>
</div>
<div class="player-hand flex flex-col gap-1 mobile-hidden">

</div>
<!-- 弃牌区 (靠近中心) - 竖着排列，支持换行 -->
<div class="player-discards flex flex-col flex-wrap gap-0.5 max-h-[200px]" id="west-discards"></div>
<!-- 副露区 -->
<div class="player-melds flex flex-col gap-1" id="west-melds"></div>
</div>

<!-- 玩家：东 (右) -->
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex flex-row-reverse items-center gap-4" data-position="east" id="player-east">
<div class="flex flex-col items-center gap-2 bg-black/40 p-2 rounded-xl border border-white/10">
<div class="player-avatar w-10 h-10 lg:w-16 lg:h-16 rounded-full border-2 border-white/30 flex items-center justify-center">
<span class="avatar-letter text-xl lg:text-2xl font-bold"></span>
<span class="avatar-icon text-sm lg:text-base"></span>
</div>
<span class="player-name text-white text-xs font-bold">等待中</span>
<span class="player-score text-yellow-400 text-xs font-bold">0</span>
<span class="player-status text-yellow-400 text-xs"></span>
</div>
<div class="player-hand flex flex-col gap-1 mobile-hidden">
<!-- 动态渲染 -->
</div>
<!-- 弃牌区 (靠近中心) - 竖着排列，支持换行 -->
<div class="player-discards flex flex-col flex-wrap gap-0.5 max-h-[200px]" id="east-discards"></div>
<!-- 副露区 -->
<div class="player-melds flex flex-col gap-1" id="east-melds"></div>
</div>

<!-- 中心区域：计时器与聊天对话框 -->
<div class="w-full max-w-[1000px] flex flex-col items-center justify-center p-4 relative pointer-events-none">

<!-- 圆形倒计时时钟 - 磨砂玻璃效果 -->
<div class="relative w-20 h-20 sm:w-24 sm:h-24 pointer-events-auto" id="timer">
  <!-- 扇面进度层 -->

<div class="p-2 flex gap-2 chat-input-area relative">

<div class="resize-handle" id="chat-resizer"></div>
</div>
</div>

<!-- 底部：手牌操作区 (我) -->
<div class="absolute bottom-4 left-1/2 -translate-x-1/2 w-[95%] max-w-[900px]" id="bottom-area">
<!-- 操作按钮 - 动态渲染，默认隐藏 -->
<div class="flex justify-center gap-3 mb-4 sm:mb-8" id="action-buttons">
</div>
<!-- 弃牌区和副露区 -->
<div class="flex flex-col items-center" id="player-south" data-position="south">
<div class="flex justify-center gap-0.5 flex-wrap max-w-[600px]" id="south-discards"></div>

</div>

<button class="flex flex-col items-center text-yellow-500">

</button>

</button>

<script type="module">
    // 主入口模块
    import './js/main.js';
    
    // 聊天对话框拖拽与缩放功能
    const movableChat = document.getElementById('movable-chat');
    const chatHeader = document.getElementById('chat-header');
    const chatResizer = document.getElementById('chat-resizer');

    let isDragging = false;
    let isResizing = false;
    let startX, startY, startWidth, startHeight, startLeft, startTop;

    // 辅助获取坐标（兼容触摸）
    const getCoords = (e) => {
        return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY };
    };

    // 拖拽位置逻辑
    const startDrag = (e) => {
        if (e.target.closest('button')) return;
        isDragging = true;
        const coords = getCoords(e);
        const rect = movableChat.getBoundingClientRect();
        startX = coords.x - rect.left;
        startY = coords.y - rect.top;
        movableChat.style.position = 'fixed';
        movableChat.style.left = rect.left + 'px';
        movableChat.style.top = rect.top + 'px';
        movableChat.style.margin = '0';
    };

    // 缩放大小逻辑
    const startResize = (e) => {
        e.stopPropagation();
        e.preventDefault();
        isResizing = true;
        const coords = getCoords(e);
        movableChat.classList.remove('w-full', 'sm:w-2/3', 'max-w-[500px]');
        startWidth = movableChat.offsetWidth;
        startHeight = movableChat.offsetHeight;
        startX = coords.x;
        startY = coords.y;
    };

    const onMove = (e) => {
        if (!isDragging && !isResizing) return;
        const coords = getCoords(e);

        if (isDragging) {
            movableChat.style.left = (coords.x - startX) + 'px';
            movableChat.style.top = (coords.y - startY) + 'px';
        } else if (isResizing) {
            const newWidth = startWidth + (coords.x - startX);
            const newHeight = startHeight + (coords.y - startY);
            movableChat.style.width = newWidth + 'px';
            movableChat.style.height = newHeight + 'px';
        }
    };

    const stopInteraction = () => {
        isDragging = false;
        isResizing = false;
    };

    // 绑定事件
    chatHeader.addEventListener('mousedown', startDrag);
    chatHeader.addEventListener('touchstart', startDrag, { passive: true });
    chatResizer.addEventListener('mousedown', startResize);
    chatResizer.addEventListener('touchstart', startResize, { passive: false });

    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('mouseup', stopInteraction);
    window.addEventListener('touchend', stopInteraction);

    // Emoji选择器
    const emojiBtn = document.getElementById('emoji-btn');
    const emojiPicker = document.getElementById('emoji-picker');
    const emojiGrid = document.getElementById('emoji-grid');
    const chatInput = document.getElementById('chat-input');

    // 常用emoji列表
    const emojis = [
      // 表情
      '😀', '😃', '😄', '😁', '😅', '😂', '🤣', '😊',
      '😇', '🙂', '😉', '😌', '😍', '🥰', '😘', '😋',
      '😛', '😜', '🤪', '😝', '🤑', '🤗', '🤭', '🤫',
      '🤔', '🤐', '🤨', '😐', '😑', '😶', '😏', '😒',
      '🙄', '😬', '🤥', '😌', '😔', '😪', '🤤', '😴',
      '😷', '🤒', '🤕', '🤢', '🤮', '🤧', '🥵', '🥶',
      // 手势
      '👍', '👎', '👏', '🙌', '🤝', '🙏', '✌️', '🤞',
      '👌', '🤙', '💪', '👊', '✊', '👋', '🤚', '🖐️',
      // 心
      '❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '💔',
      '💕', '💖', '💗', '💘', '💝', '💟', '♥️', '❣️',
      // 其他
      '🎉', '🎊', '🎁', '🏆', '🎮', '🎯', '🎲', '🀄',
      '✨', '💫', '⭐', '🌟', '🔥', '💥', '💢', '💦',
      '👑', '💎', '💰', '💸', '🎯', '🔥', '💯', '✅'
    ];

    // 填充emoji网格
    emojis.forEach(emoji => {
      const btn = document.createElement('button');
      btn.className = 'hover:bg-slate-600 rounded p-1 cursor-pointer transition-colors';
      btn.textContent = emoji;
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        // 插入emoji到输入框
        const start = chatInput.selectionStart;
        const end = chatInput.selectionEnd;
        const text = chatInput.value;
        chatInput.value = text.substring(0, start) + emoji + text.substring(end);
        // 光标移到emoji后面
        chatInput.selectionStart = chatInput.selectionEnd = start + emoji.length;
        chatInput.focus();
        // 隐藏选择器
        emojiPicker.classList.add('hidden');
      });
      emojiGrid.appendChild(btn);
    });

    // 点击emoji按钮显示/隐藏选择器
    emojiBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      emojiPicker.classList.toggle('hidden');
    });

    // 点击其他地方隐藏选择器
    document.addEventListener('click', (e) => {
      if (!emojiPicker.contains(e.target) && e.target !== emojiBtn) {
        emojiPicker.classList.add('hidden');
      }
    });
</script>
</body>
</html>
